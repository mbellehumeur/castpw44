<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slicer Cast Test Client</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #2b2b2b;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #3d3d3d;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        h1, h2 {
            color: #e0e0e0;
            margin-top: 0;
        }
        h1 {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #666;
            border-radius: 4px;
            background-color: #4a4a4a;
            color: #e0e0e0;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #90A4AE;
        }
        textarea {
            min-height: 100px;
            font-family: monospace;
            resize: vertical;
        }
        button {
            padding: 10px 20px;
            border: 1px solid #666;
            border-radius: 4px;
            background-color: #90A4AE;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #78909C;
            border-color: #90A4AE;
        }
        button:disabled {
            background-color: #3a3a3a;
            color: #777;
            cursor: not-allowed;
            border-color: #555;
        }
        .status {
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            background-color: #4a4a4a;
        }
        .status.connected {
            border-left: 4px solid #90A4AE;
        }
        .status.disconnected {
            border-left: 4px solid #d32f2f;
        }
        .status.connecting {
            border-left: 4px solid #ff9800;
        }
        .messages {
            max-height: 400px;
            overflow-y: auto;
            background-color: #2b2b2b;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
        }
        .message {
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            background-color: #3d3d3d;
            border-left: 3px solid #90A4AE;
            word-wrap: break-word;
        }
        .message.received {
            border-left-color: #4CAF50;
        }
        .message.sent {
            border-left-color: #2196F3;
        }
        .message.error {
            border-left-color: #d32f2f;
            background-color: #5d4037;
        }
        .message-header {
            color: #b0b0b0;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .message-content {
            color: #e0e0e0;
            white-space: pre-wrap;
        }
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #555;
        }
        .section:last-child {
            border-bottom: none;
        }
        .error {
            background-color: #5d4037;
            color: #ffb74d;
            padding: 12px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 3px solid #ff9800;
        }
        .success {
            background-color: #2e7d32;
            color: #a5d6a7;
            padding: 12px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 3px solid #4CAF50;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .section-header:hover {
            color: #90A4AE;
        }
        .section-header h2 {
            margin: 0;
            flex: 1;
        }
        .toggle-button {
            background: none;
            border: none;
            color: #90A4AE;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
            margin: 0;
            transition: transform 0.2s;
        }
        .toggle-button:hover {
            color: #78909C;
        }
        .toggle-button.collapsed {
            transform: rotate(-90deg);
        }
        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            max-height: 5000px;
            opacity: 1;
        }
        .collapsible-content.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span style="display: flex; align-items: center;">
                <img src="/images/3DSlicer-DesktopIcon.png" alt="3D Slicer" onerror="this.style.display='none'" style="height: 40px; vertical-align: middle; margin-right: 10px;">
                3D Slicer Cast Test Client
            </span>
            <span style="font-weight: normal; color: #90A4AE; font-size: 24px;">
                ID: <span id="topicDisplay"></span>
            </span>
        </h1>
        
        <div class="section">
            <h2>Subscribe</h2>
            <div style="display: flex; align-items: flex-end; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;">
                <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                    <label for="hubSelect">Hub:</label>
                    <select id="hubSelect" style="width: 100%;">
                        <option value="local">local</option>
                        <option value="SLICER-HUB">3D Slicer Cast Hub</option>
                        <option value="MEDPLUM">Medplum FHIRCast hub</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                    <label for="subscriberName">Subscriber:</label>
                    <input type="text" id="subscriberName" placeholder="Auto-filled from token">
                </div>
                <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                    <label for="topic">Topic:</label>
                    <input type="text" id="topic" value="test-topic" placeholder="Enter topic name">
                </div>
                <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                    <label for="events">Events:</label>
                    <input type="text" id="events" value="*" placeholder="* or update,close">
                </div>
                <div id="connectionStatus" class="status disconnected" style="flex: 0 0 auto; margin-bottom: 0;">
                    <strong>Status:</strong> <span id="statusText">Not connected</span>
                </div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="subscribeBtn" onclick="subscribe()">Subscribe</button>
                <button id="unsubscribeBtn" onclick="unsubscribe()" disabled>Unsubscribe</button>
                <div id="subscribeStatus" style="flex: 1;"></div>
            </div>
        </div>

        <div class="section">
            <h2>Publish</h2>
            <div id="publishContent">
                <div class="form-group" style="display: flex; gap: 15px; align-items: flex-end;">
                    <div style="flex: 1;">
                        <label for="eventType">Event Type:</label>
                        <select id="eventType" style="width: 100%;" onchange="handleEventTypeChange()">
                            <option value="imagingstudy-open" selected>imagingstudy-open</option>
                            <option value="imagingstudy-close">imagingstudy-close</option>
                            <option value="custom">Other (custom)</option>
                        </select>
                        <input type="text" id="eventTypeCustom" placeholder="Enter custom event type" style="display: none; margin-top: 10px; width: 100%;">
                    </div>
                    <div style="flex: 1;">
                        <label for="publishTopic">Topic:</label>
                        <input type="text" id="publishTopic" value="test-topic" placeholder="Enter topic name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="eventData">Event Data (JSON):</label>
                    <textarea id="eventData" placeholder='{"key": "value"}'>[
  {
    "key": "patient",
    "resource": {
      "resourceType": "Patient",
      "id": "NEW_PATIENT_ID",
      "identifier": [
        {
          "system": "urn:oid:2.16.840.1.113883.4.2",
          "value": "NEW_PATIENT_ID"
        }
      ],
      "name": [
        {
          "text": [
            {
              "Alphabetic": "CTA Head and Neck"
            }
          ]
        }
      ]
    }
  },
  {
    "key": "study",
    "resource": {
      "resourceType": "ImagingStudy",
      "id": "2.16.840.1.114362.1.11972228.22789312658.616067305.306.2",
      "uid": "urn:oid:2.16.840.1.114362.1.11972228.22789312658.616067305.306.2",
      "identifier": [],
      "patient": {
        "reference": "Patient/NEW_PATIENT_ID"
      },
      "status": "available"
    }
  }
]</textarea>
                </div>
                <div style="margin-top: 15px;">
                    <button id="publishBtn" onclick="publish()">Publish</button>
                </div>
                
                <div id="publishStatus"></div>
            </div>
        </div>

        <div class="section">
            <h2>Get</h2>
            <div id="getContent">
                <div class="form-group" style="display: flex; gap: 15px; align-items: flex-end;">
                    <div style="flex: 1;">
                        <label for="getSubscriber">Subscriber:</label>
                        <input type="text" id="getSubscriber" placeholder="Enter subscriber name">
                    </div>
                    <div style="flex: 1;">
                        <label for="getDataType">DataType:</label>
                        <select id="getDataType">
                            <option value="">Select data type</option>
                            <option value="SCENEVIEW" selected>SCENEVIEW</option>
                            <option value="TRANSFORM">TRANSFORM</option>
                            <option value="POSITION">POSITION</option>
                            <option value="CAPIBIL">CAPIBIL</option>
                            <option value="STATUS">STATUS</option>
                            <option value="TDATA">TDATA</option>
                            <option value="IMGMETA">IMGMETA</option>
                            <option value="LBMETA">LBMETA</option>
                            <option value="POINT">POINT</option>
                            <option value="TRAJ">TRAJ</option>
                            <option value="NDARRAY">NDARRAY</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <button id="getBtn" onclick="getHubData()">Get</button>
                </div>
                
                <div id="getStatus"></div>
                <div id="getResults" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div class="section">
            <h2>Collaborate</h2>
            <div id="conferencingContent">
                <button onclick="openConferenceClient()">Open Conference Client</button>
            </div>
        </div>

        <div class="section">
            <h2>Received Messages <span id="messageCount" style="font-weight: normal; color: #90A4AE; margin-left: 10px;">(0)</span></h2>
            <button onclick="clearMessages()">Clear Messages</button>
            <div id="messages" class="messages"></div>
        </div>
    </div>

    <script>
        let websocket = null;
        let websocketUrl = null;
        let subscribed = false;
        let accessToken = null;
        let subscriberName = null;
        let topicFromToken = null;
        let messageCount = 0;

        // Hub configuration
        const hubConfigs = {
            'local': '/api/hub/',
            'SLICER-HUB': 'http://localhost:2016/api/hub',
            'MEDPLUM': 'https://api.medplum.staging.radai.com/fhircast/STU3'
        };

        function getHubEndpoint() {
            const hubSelect = document.getElementById('hubSelect');
            const selectedHub = hubSelect.value;
            return hubConfigs[selectedHub] || hubConfigs['local'];
        }

        // Get topic from URL parameter
        function getTopicFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('topic');
        }

        // Query token endpoint on startup
        async function initializeToken() {
            try {
                // Get topic from URL if provided
                const topicFromUrl = getTopicFromUrl();
                
                const tokenParams = new URLSearchParams({
                    'client_product_name': 'TEST-CLIENT'
                });
                
                // Add topic to search parameters if provided in URL
                if (topicFromUrl) {
                    tokenParams.append('topic', topicFromUrl);
                }
                
                const response = await fetch('/oauth/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: tokenParams
                });

                if (response.ok) {
                    const tokenData = await response.json();
                    accessToken = tokenData.access_token;
                   
                    topicFromToken = tokenData.topic;
                    subscriberName ='TEST-CLIENT-' + tokenData.topic ;

                    // Use topic from URL if provided, otherwise use topic from token
                    const topicToUse = topicFromUrl || topicFromToken;
                    
                    // Update UI
                    document.getElementById('topicDisplay').textContent = topicToUse;
                    document.getElementById('subscriberName').value = subscriberName;
                    
                    document.getElementById('topic').value = topicToUse;
                    document.getElementById('publishTopic').value = topicToUse;

                    addMessage('received', `Token obtained: ${subscriberName}`, 'Initialization');
                } else {
                    console.error('Failed to get token:', response.status);
                    addMessage('error', `Failed to get token: ${response.status}`, 'Error');
                }
            } catch (error) {
                console.error('Error getting token:', error);
                addMessage('error', `Error getting token: ${error.message}`, 'Error');
            }
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initializeToken);

        function addMessage(type, content, label = '') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            const header = label ? `${label} - ${timestamp}` : timestamp;
            
            messageDiv.innerHTML = `
                <div class="message-header">${header}</div>
                <div class="message-content">${typeof content === 'string' ? content : JSON.stringify(content, null, 2)}</div>
            `;
            
            messagesDiv.insertBefore(messageDiv, messagesDiv.firstChild);
            
            // Increment and update message count
            messageCount++;
            document.getElementById('messageCount').textContent = `(${messageCount})`;
            
            // Keep only last 50 messages
            while (messagesDiv.children.length > 50) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }

        function showStatus(elementId, message, isError = false) {
            const statusDiv = document.getElementById(elementId);
            statusDiv.innerHTML = `<div class="${isError ? 'error' : 'success'}">${message}</div>`;
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 2000);
        }

        function updateConnectionStatus(status, text) {
            const statusDiv = document.getElementById('connectionStatus');
            const statusText = document.getElementById('statusText');
            statusDiv.className = `status ${status}`;
            statusText.textContent = text;
        }

        async function subscribe() {
            const topic = document.getElementById('topic').value.trim();
            const events = document.getElementById('events').value.trim();
            const hubEndpoint = getHubEndpoint();

            if (!topic || !subscriberName) {
                showStatus('subscribeStatus', 'Topic and Subscriber Name are required', true);
                return;
            }

            try {
                // Use URLSearchParams instead of FormData to match reference implementation
                const subscribeFormData = new URLSearchParams();
                subscribeFormData.append('hub.mode', 'subscribe');
                subscribeFormData.append('hub.channel.type', 'websocket');
                subscribeFormData.append('hub.callback', window.location.origin + '/castCallback');
                subscribeFormData.append('hub.events', events || '*');
                subscribeFormData.append('hub.topic', topic);
                subscribeFormData.append('hub.lease', '7200');
                subscribeFormData.append('subscriber.name', 'TEST-CLIENT-'+topic);

                const headers = {
                    'Content-Type': 'application/x-www-form-urlencoded'
                };
                
                // Add Authorization header if we have a token
                if (accessToken) {
                    headers['Authorization'] = `Bearer ${accessToken}`;
                }

                const response = await fetch(hubEndpoint, {
                    method: 'POST',
                    headers: headers,
                    body: subscribeFormData
                });

                // Check specifically for 202 status like reference code
                if (response.status == 202) {
                    const subscriptionResponse = await response.json();
                    websocketUrl = subscriptionResponse['hub.channel.endpoint'];

                    if (!websocketUrl) {
                        console.error('Response data:', subscriptionResponse);
                        throw new Error('No WebSocket URL returned from subscription. Response: ' + JSON.stringify(subscriptionResponse));
                    }

                    // Normalize WebSocket URL to use correct domain (like reference code)
                    // For local hub, normalize to use current origin. For remote hubs, use URL as-is.
                    let normalizedWebsocketUrl = websocketUrl;
                    const hubSelect = document.getElementById('hubSelect');
                    const selectedHub = hubSelect.value;
                    
                    if (selectedHub === 'local') {
                        try {
                            const hubEndpointUrl = new URL(window.location.origin);
                            const websocketUrlObj = new URL(websocketUrl);
                            
                            // Replace the domain/host with the one from current origin
                            // Convert http/https to ws/wss
                            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                            normalizedWebsocketUrl = websocketUrl.replace(
                                websocketUrlObj.origin,
                                `${wsProtocol}//${hubEndpointUrl.host}`
                            );
                        } catch (err) {
                            console.warn('Could not normalize WebSocket URL, using original:', err);
                        }
                    } else {
                        // For remote hubs, convert http/https to ws/wss if needed
                        try {
                            const websocketUrlObj = new URL(websocketUrl);
                            if (websocketUrlObj.protocol === 'http:') {
                                normalizedWebsocketUrl = websocketUrl.replace('http://', 'ws://');
                            } else if (websocketUrlObj.protocol === 'https:') {
                                normalizedWebsocketUrl = websocketUrl.replace('https://', 'wss://');
                            }
                        } catch (err) {
                            console.warn('Could not process WebSocket URL, using original:', err);
                        }
                    }

                    addMessage('sent', `Subscribed to topic: ${topic}`, 'Subscribe');
                    
                    subscribed = true;
                    document.getElementById('subscribeBtn').disabled = true;
                    document.getElementById('unsubscribeBtn').disabled = false;

                    // Connect to WebSocket with normalized URL
                    connectWebSocket(normalizedWebsocketUrl);

                } else if (response.status == 401) {
                    showStatus('subscribeStatus', 'Subscription response 401 - Token refresh needed', true);
                } else {
                    const errorText = await response.text();
                    throw new Error(`Subscription rejected by hub: ${response.status}, message: ${errorText}`);
                }
            } catch (error) {
                console.error('Subscribe error:', error);
                addMessage('error', `Subscribe error: ${error.message}`, 'Error');
                showStatus('subscribeStatus', `Error: ${error.message}`, true);
            }
        }

        function connectWebSocket(url) {
            if (websocket) {
                websocket.close();
            }

            // Store the original websocketUrl for confirmation message (before normalization)
            const originalWebsocketUrl = websocketUrl;

            updateConnectionStatus('connecting', 'Connecting...');
            addMessage('sent', `Connecting to: ${url}`, 'WebSocket');

            try {
                websocket = new WebSocket(url);

                websocket.onopen = function(event) {
                    console.log('WebSocket connected');
                    updateConnectionStatus('connected', 'Connected');
                    addMessage('received', 'WebSocket connection established', 'Connection');
                    
                    // Send confirmation message like reference code
                    if (originalWebsocketUrl) {
                        websocket.send(JSON.stringify({"hub.channel.endpoint": originalWebsocketUrl}));
                        addMessage('sent', {"hub.channel.endpoint": originalWebsocketUrl}, 'WebSocket Confirmation');
                    }
                };

                websocket.onmessage = function(event) {
                    try {
                        const message = JSON.parse(event.data);
                        console.log('Received message:', message);
                        addMessage('received', message, 'Received');
                    } catch (e) {
                        addMessage('received', event.data, 'Received (raw)');
                    }
                };

                websocket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    addMessage('error', 'WebSocket error occurred', 'Error');
                    updateConnectionStatus('disconnected', 'Connection error');
                };

                websocket.onclose = function(event) {
                    console.log('WebSocket closed');
                    updateConnectionStatus('disconnected', 'Disconnected');
                    addMessage('received', 'WebSocket connection closed', 'Connection');
                    websocket = null;
                };

            } catch (e) {
                console.error('Error creating WebSocket:', e);
                addMessage('error', `WebSocket error: ${e.message}`, 'Error');
                updateConnectionStatus('disconnected', 'Connection failed');
            }
        }

        async function unsubscribe() {
            if (!websocketUrl) {
                showStatus('subscribeStatus', 'Not subscribed', true);
                return;
            }

            try {
                const topic = document.getElementById('topic').value.trim();
                const events = document.getElementById('events').value.trim();
                const hubEndpoint = getHubEndpoint();

                // Use URLSearchParams to match reference implementation
                const subscribeFormData = new URLSearchParams();
                subscribeFormData.append('hub.mode', 'unsubscribe');
                subscribeFormData.append('hub.channel.type', 'websocket');
                subscribeFormData.append('hub.callback', window.location.origin + '/castCallback');
                subscribeFormData.append('hub.events', events || '*');
                subscribeFormData.append('hub.topic', topic);
                subscribeFormData.append('hub.lease', '7200');
                subscribeFormData.append('subscriber.name', 'TEST-CLIENT-'+topic);

                const headers = {
                    'Content-Type': 'application/x-www-form-urlencoded'
                };
                
                // Add Authorization header if we have a token
                if (accessToken) {
                    headers['Authorization'] = `Bearer ${accessToken}`;
                }

                const response = await fetch(hubEndpoint, {
                    method: 'POST',
                    headers: headers,
                    body: subscribeFormData
                });

                // Check for success status (200 OK or 202 Accepted)
                if (response.status == 200 || response.status == 202) {
                    const subscriptionResponse = await response.json();
                    console.log('Unsubscribe successfully from hub');
                    addMessage('sent', `Unsubscribed from topic: ${topic}`, 'Unsubscribe');
                    showStatus('subscribeStatus', 'Unsubscribed successfully');
                } else {
                    console.log('Unsubscribe refused by the hub');
                    const errorText = await response.text();
                    throw new Error(`Unsubscribe refused by hub: ${response.status}, message: ${errorText}`);
                }

                // Close WebSocket after unsubscribing (like reference code)
                if (websocket) {
                    websocket.close();
                    websocket = null;
                }

                subscribed = false;
                websocketUrl = null;
                document.getElementById('subscribeBtn').disabled = false;
                document.getElementById('unsubscribeBtn').disabled = true;
                updateConnectionStatus('disconnected', 'Not connected');

            } catch (error) {
                console.error('Unsubscribe error:', error);
                addMessage('error', `Unsubscribe error: ${error.message}`, 'Error');
                showStatus('subscribeStatus', `Error: ${error.message}`, true);
            }
        }

        async function publish() {
            const topic = document.getElementById('publishTopic').value.trim();
            const eventTypeSelect = document.getElementById('eventType');
            const eventTypeCustom = document.getElementById('eventTypeCustom');
            const eventDataText = document.getElementById('eventData').value.trim();

            // Use custom input value if "custom" is selected, otherwise use dropdown value
            const eventType = eventTypeSelect.value === 'custom' 
                ? eventTypeCustom.value.trim() 
                : eventTypeSelect.value.trim();

            if (!topic || !eventType) {
                showStatus('publishStatus', 'Topic and Event Type are required', true);
                return;
            }

            let eventData;
            try {
                eventData = eventDataText ? JSON.parse(eventDataText) : {};
            } catch (e) {
                showStatus('publishStatus', 'Invalid JSON in Event Data', true);
                return;
            }

            try {
                // Generate UUID for message id
                const messageId = crypto.randomUUID ? crypto.randomUUID() : 
                    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                        const r = Math.random() * 16 | 0;
                        const v = c == 'x' ? r : (r & 0x3 | 0x8);
                        return v.toString(16);
                    });

                const payload = {
                    "timestamp": new Date().toISOString(),
                    "id": messageId,
                    "event": {
                        "hub.topic": topic,
                        "hub.event": eventType,
                        "context": eventData
                    }
                };

                const response = await fetch(`/api/hub/${encodeURIComponent(topic)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addMessage('sent', payload, 'Published');
                showStatus('publishStatus', 'Event published successfully');

            } catch (error) {
                console.error('Publish error:', error);
                addMessage('error', `Publish error: ${error.message}`, 'Error');
                showStatus('publishStatus', `Error: ${error.message}`, true);
            }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            messageCount = 0;
            document.getElementById('messageCount').textContent = '(0)';
        }

        function handleEventTypeChange() {
            const eventTypeSelect = document.getElementById('eventType');
            const customInput = document.getElementById('eventTypeCustom');
            if (eventTypeSelect.value === 'custom') {
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                customInput.style.display = 'none';
            }
        }

        async function getHubData() {
            const subscriber = document.getElementById('getSubscriber').value.trim();
            const dataType = document.getElementById('getDataType').value.trim();
            
            const getBtn = document.getElementById('getBtn');
            const statusDiv = document.getElementById('getStatus');
            const resultsDiv = document.getElementById('getResults');
            
            getBtn.disabled = true;
            getBtn.textContent = 'Loading...';
            statusDiv.innerHTML = '';
            resultsDiv.innerHTML = '';
            
            try {
                // Mock the GET request for now
                // In the future, this will call: GET /api/hub/{topic}?subscriber={subscriber}&dataType={dataType}
                await new Promise(resolve => setTimeout(resolve, 500)); // Simulate network delay
                
                const mockResponse = {
                    subscriber: subscriber || "unknown",
                    dataType: dataType || "unknown",
                    topic: document.getElementById('topic').value.trim() || "test-topic",
                    context: {
                        timestamp: new Date().toISOString(),
                        subscriber: subscriber || "unknown",
                        dataType: dataType || "unknown",
                        data: "Mock response data"
                    }
                };
                
                // Display results
                let resultsHTML = '<div style="background-color: #4a4a4a; padding: 15px; border-radius: 4px; margin-top: 10px;">';
                resultsHTML += '<h4 style="margin-top: 0; color: #e0e0e0;">Response:</h4>';
                resultsHTML += '<div style="max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px;">';
                resultsHTML += '<pre style="color: #e0e0e0; white-space: pre-wrap; word-wrap: break-word;">' + JSON.stringify(mockResponse, null, 2).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;') + '</pre>';
                resultsHTML += '</div></div>';
                resultsDiv.innerHTML = resultsHTML;
                
                addMessage('sent', `GET request (mocked) - Subscriber: ${subscriber || 'none'}, DataType: ${dataType || 'none'}`, 'Get');
                showStatus('getStatus', 'Request successful (mocked)');
            } catch (error) {
                console.error('Get error:', error);
                showStatus('getStatus', `Error: ${error.message}`, true);
                resultsDiv.innerHTML = '';
            } finally {
                getBtn.disabled = false;
                getBtn.textContent = 'Get';
            }
        }

        function openConferenceClient() {
            const topic = document.getElementById('topic').value.trim();
            if (!subscriberName) {
                alert('Subscriber name not available. Please wait for initialization.');
                return;
            }
            if (!topic) {
                alert('Topic is required.');
                return;
            }
            const url = `/api/hub/conference-client?subscriberName=${encodeURIComponent(subscriberName)}&topic=${encodeURIComponent(topic)}`;
            window.open(url, '_blank');
        }

        function toggleSection(contentId) {
            const content = document.getElementById(contentId);
            const toggleButton = document.getElementById(contentId === 'publishContent' ? 'publishToggle' : 'conferencingToggle');
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                toggleButton.classList.remove('collapsed');
                toggleButton.textContent = '▼';
            } else {
                content.classList.add('collapsed');
                toggleButton.classList.add('collapsed');
                toggleButton.textContent = '▶';
            }
        }

        let inConference = false;
        let conferenceParticipants = [];

        function updateConferenceStatus(status, text) {
            const statusDiv = document.getElementById('conferenceStatus');
            const statusText = document.getElementById('conferenceStatusText');
            statusDiv.className = `status ${status}`;
            statusText.textContent = text;
        }

        function updateParticipantsList() {
            const participantsDiv = document.getElementById('participantsList');
            if (conferenceParticipants.length === 0) {
                participantsDiv.textContent = 'No participants';
                participantsDiv.style.color = '#b0b0b0';
            } else {
                participantsDiv.innerHTML = conferenceParticipants.map(p => 
                    `<div style="padding: 5px 0; border-bottom: 1px solid #555;">${p}</div>`
                ).join('');
                participantsDiv.style.color = '#e0e0e0';
            }
        }

        async function joinConference() {
            const topic = document.getElementById('conferenceTopic').value.trim();
            const conferenceName = document.getElementById('conferenceName').value.trim();

            if (!topic) {
                showStatus('conferenceActionStatus', 'Topic is required', true);
                return;
            }

            try {
                updateConferenceStatus('connecting', 'Joining...');
                
                // Add current user to participants if not already there
                if (subscriberName && !conferenceParticipants.includes(subscriberName)) {
                    conferenceParticipants.push(subscriberName);
                    updateParticipantsList();
                }

                inConference = true;
                document.getElementById('joinConferenceBtn').disabled = true;
                document.getElementById('leaveConferenceBtn').disabled = false;
                updateConferenceStatus('connected', `In conference: ${conferenceName || topic}`);
                
                addMessage('sent', `Joined conference: ${conferenceName || topic}`, 'Conference');
                showStatus('conferenceActionStatus', 'Joined conference successfully');

            } catch (error) {
                console.error('Join conference error:', error);
                addMessage('error', `Join conference error: ${error.message}`, 'Error');
                showStatus('conferenceActionStatus', `Error: ${error.message}`, true);
                updateConferenceStatus('disconnected', 'Not in conference');
            }
        }

        async function leaveConference() {
            try {
                const topic = document.getElementById('conferenceTopic').value.trim();
                const conferenceName = document.getElementById('conferenceName').value.trim();

                // Remove current user from participants
                if (subscriberName) {
                    conferenceParticipants = conferenceParticipants.filter(p => p !== subscriberName);
                    updateParticipantsList();
                }

                inConference = false;
                document.getElementById('joinConferenceBtn').disabled = false;
                document.getElementById('leaveConferenceBtn').disabled = true;
                updateConferenceStatus('disconnected', 'Not in conference');
                
                addMessage('sent', `Left conference: ${conferenceName || topic}`, 'Conference');
                showStatus('conferenceActionStatus', 'Left conference successfully');

            } catch (error) {
                console.error('Leave conference error:', error);
                addMessage('error', `Leave conference error: ${error.message}`, 'Error');
                showStatus('conferenceActionStatus', `Error: ${error.message}`, true);
            }
        }

        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            if (websocket) {
                websocket.close();
            }
        });
    </script>
</body>
</html>
