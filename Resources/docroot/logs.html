<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Logs - Cast Hub</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            background-color: #1e1e1e;
            color: #e0e0e0;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #e0e0e0;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        h1 img {
            height: 40px;
            margin-right: 10px;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        .status.connected {
            background-color: #2e7d32;
            color: #a5d6a7;
        }
        .status.connecting {
            background-color: #f57c00;
            color: #ffe0b2;
        }
        .status.disconnected {
            background-color: #c62828;
            color: #ef9a9a;
        }
        button {
            padding: 8px 16px;
            border: 1px solid #666;
            border-radius: 4px;
            background-color: #4a4a4a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        button:hover:not(:disabled) {
            background-color: #5a5a5a;
            border-color: #777;
        }
        button:disabled {
            background-color: #3a3a3a;
            color: #777;
            cursor: not-allowed;
            border-color: #555;
        }
        .log-container {
            flex: 1;
            overflow-y: auto;
            background-color: #1e1e1e;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 10px;
        }
        .log-entry {
            margin: 2px 0;
            padding: 2px 0;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .log-entry.error {
            color: #f44336;
        }
        .log-entry.warning {
            color: #ff9800;
        }
        .log-entry.info {
            color: #2196f3;
        }
        .log-entry.success {
            color: #4caf50;
        }
        .log-timestamp {
            color: #888;
            margin-right: 8px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .stat-item {
            background: #3a3a3a;
            padding: 10px 15px;
            border-radius: 4px;
            border-left: 3px solid #90A4AE;
        }
        .stat-item label {
            display: block;
            font-size: 12px;
            color: #b0b0b0;
            margin-bottom: 4px;
        }
        .stat-item .value {
            font-size: 20px;
            font-weight: bold;
            color: #e0e0e0;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .auto-scroll-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auto-scroll-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .empty-logs {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span style="display: flex; align-items: center;">
                <img src="/images/3DSlicer-DesktopIcon.png" alt="3D Slicer" onerror="this.style.display='none'">
                Application Logs
            </span>
            <div class="header-controls">
                <span id="connectionStatus" class="status disconnected">Disconnected</span>
                <button onclick="window.open('/api/hub/admin', '_blank')">Admin Panel</button>
            </div>
        </h1>

        <div class="stats">
            <div class="stat-item">
                <label>Total Log Entries</label>
                <div class="value" id="totalLogs">0</div>
            </div>
            <div class="stat-item">
                <label>Logs Received</label>
                <div class="value" id="logsReceived">0</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="clearLogs()">Clear Logs</button>
            <div class="auto-scroll-toggle">
                <input type="checkbox" id="autoScroll" checked>
                <label for="autoScroll">Auto-scroll</label>
            </div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="empty-logs">Waiting for logs...</div>
        </div>
    </div>

    <script>
        let logWebSocket = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let logCount = 0;
        let autoScroll = true;

        function updateConnectionStatus(status, text) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = 'status ' + status;
            statusEl.textContent = text;
        }

        function addLogEntry(message) {
            const container = document.getElementById('logContainer');
            
            // Remove empty message if present
            const emptyMsg = container.querySelector('.empty-logs');
            if (emptyMsg) {
                emptyMsg.remove();
            }

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            // Parse log message to extract timestamp and content
            const timestampMatch = message.match(/^\[([^\]]+)\]\s*(.*)$/);
            if (timestampMatch) {
                const timestamp = timestampMatch[1];
                const content = timestampMatch[2];
                
                // Determine log level based on content
                const lowerContent = content.toLowerCase();
                if (lowerContent.includes('error') || lowerContent.includes('failed') || lowerContent.includes('exception')) {
                    entry.classList.add('error');
                } else if (lowerContent.includes('warning') || lowerContent.includes('warn')) {
                    entry.classList.add('warning');
                } else if (lowerContent.includes('success') || lowerContent.includes('completed')) {
                    entry.classList.add('success');
                } else {
                    entry.classList.add('info');
                }
                
                entry.innerHTML = `<span class="log-timestamp">[${escapeHtml(timestamp)}]</span>${escapeHtml(content)}`;
            } else {
                entry.textContent = message;
            }
            
            container.appendChild(entry);
            logCount++;
            document.getElementById('totalLogs').textContent = logCount;
            document.getElementById('logsReceived').textContent = logCount;
            
            // Auto-scroll to bottom if enabled
            if (autoScroll) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function clearLogs() {
            const container = document.getElementById('logContainer');
            container.innerHTML = '<div class="empty-logs">Logs cleared</div>';
            logCount = 0;
            document.getElementById('totalLogs').textContent = '0';
            document.getElementById('logsReceived').textContent = '0';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function connectLogWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/logs`;
            
            try {
                logWebSocket = new WebSocket(wsUrl);
                
                logWebSocket.onopen = function(event) {
                    console.log('Log WebSocket connected');
                    reconnectAttempts = 0;
                    updateConnectionStatus('connected', 'Connected');
                };
                
                logWebSocket.onmessage = function(event) {
                    try {
                        const message = JSON.parse(event.data);
                        console.log('Received log message:', message);
                        
                        if (message.type === 'log') {
                            addLogEntry(message.message);
                        } else if (message.type === 'connection.established') {
                            console.log('Log viewer connection established');
                            updateConnectionStatus('connected', 'Connected');
                        } else if (message.type === 'ping') {
                            // Respond to ping with pong
                            logWebSocket.send(JSON.stringify({ type: 'pong' }));
                        }
                    } catch (e) {
                        console.error('Error parsing log message:', e);
                    }
                };
                
                logWebSocket.onerror = function(error) {
                    console.error('Log WebSocket error:', error);
                    updateConnectionStatus('disconnected', 'Connection Error');
                };
                
                logWebSocket.onclose = function(event) {
                    console.log('Log WebSocket closed');
                    updateConnectionStatus('disconnected', 'Disconnected');
                    
                    // Attempt to reconnect
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        console.log(`Attempting to reconnect (${reconnectAttempts}/${maxReconnectAttempts})...`);
                        updateConnectionStatus('connecting', `Reconnecting (${reconnectAttempts}/${maxReconnectAttempts})...`);
                        setTimeout(connectLogWebSocket, 2000 * reconnectAttempts);
                    } else {
                        console.error('Max reconnection attempts reached');
                        updateConnectionStatus('disconnected', 'Connection Failed');
                    }
                };
            } catch (e) {
                console.error('Error creating log WebSocket:', e);
                updateConnectionStatus('disconnected', 'Connection Failed');
            }
        }

        // Auto-scroll checkbox handler
        document.getElementById('autoScroll').addEventListener('change', function(e) {
            autoScroll = e.target.checked;
            if (autoScroll) {
                const container = document.getElementById('logContainer');
                container.scrollTop = container.scrollHeight;
            }
        });

        // Connect on page load
        window.addEventListener('load', function() {
            updateConnectionStatus('connecting', 'Connecting...');
            connectLogWebSocket();
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', function() {
            if (logWebSocket) {
                logWebSocket.close();
            }
        });
    </script>
</body>
</html>
