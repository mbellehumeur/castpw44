<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slicer Cast Conference Client</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #2b2b2b;
            color: #e0e0e0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #3d3d3d;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e0e0e0;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 img {
            height: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #666;
            border-radius: 4px;
            background-color: #4a4a4a;
            color: #e0e0e0;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #90A4AE;
        }
        input:disabled {
            background-color: #3a3a3a;
            color: #999;
            cursor: not-allowed;
        }
        button {
            padding: 10px 20px;
            border: 1px solid #666;
            border-radius: 4px;
            background-color: #90A4AE;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #78909C;
            border-color: #90A4AE;
        }
        button:disabled {
            background-color: #3a3a3a;
            color: #777;
            cursor: not-allowed;
            border-color: #555;
        }
        .status {
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            background-color: #4a4a4a;
        }
        .status.success {
            border-left: 4px solid #4CAF50;
            background-color: #2e7d32;
            color: #a5d6a7;
        }
        .status.error {
            border-left: 4px solid #d32f2f;
            background-color: #5d4037;
            color: #ffb74d;
        }
        .info-box {
            background-color: #4a4a4a;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #90A4AE;
        }
        .info-box strong {
            color: #90A4AE;
        }
        .topic-checkbox {
            margin: 8px 0;
            display: flex;
            align-items: center;
        }
        .topic-checkbox input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }
        .topic-checkbox label {
            margin: 0;
            cursor: pointer;
            color: #e0e0e0;
            font-weight: normal;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #555;
        }
        th {
            background-color: #4a4a4a;
            font-weight: 600;
        }
        tr:hover {
            background-color: #4a4a4a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- <h1>
            <img src="/images/3DSlicer-DesktopIcon.png" alt="3D Slicer" onerror="this.style.display='none'">
            3D Slicer Cast Conference
        </h1> -->

        <div id="statusMessage"></div>

        <div id="createConferenceSection">
            <h2>Create Conference</h2>
            <form id="conferenceForm" onsubmit="createConference(event)">
            <div class="form-group">
                <label for="title">Conference Title:</label>
                <select id="title" required onchange="handleTitleChange()">
                    <option value="">Select a conference title</option>
                    <option value="Test conference">Test conference</option>
                    <option value="Tumor Board">Tumor Board</option>
                    <option value="Case review">Case discussion</option>
                    <option value="Pedicle screw">Pedicle screw</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group" id="otherTitleGroup" style="display: none;">
                <label for="otherTitle">Other Title:</label>
                <input type="text" id="otherTitle" placeholder="Enter custom conference title">
            </div>
            <div class="form-group">
                <label>Select Topics:</label>
                <div id="topicsList" style="max-height: 200px; overflow-y: auto; border: 1px solid #666; border-radius: 4px; padding: 10px; background-color: #4a4a4a;">
                    <p style="color: #999; font-style: italic;">Loading topics...</p>
                </div>
            </div>
            <button type="submit" id="createButton">Create Conference</button>
            </form>
        </div>

        <div id="manageConferenceSection" style="display: none;">
            <h2>Manage Conference</h2>
            <div id="conferenceInfo" style="background-color: #4a4a4a; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #90A4AE;">
                <p><strong>Conference Title:</strong> <span id="conferenceTitleDisplay">-</span></p>
                <p><strong>User:</strong> <span id="conferenceUserDisplay">-</span></p>
                <p><strong>Topics:</strong> <span id="conferenceTopicsDisplay">-</span></p>
            </div>
            <button id="exitConferenceButton" onclick="exitConference()">Exit Conference</button>
        </div>

        <h2>Active Conferences</h2>
        <div id="conferencesList">
            <p>Loading conferences...</p>
        </div>
        <button onclick="loadConferences()">Refresh</button>
    </div>

    <script>
        let subscriberName = null;
        let topicName = null;
        let allTopics = [];
        let currentConference = null;  // Store the conference the topic is in

        // Read subscriber and topic from URL parameters
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            subscriberName = urlParams.get('subscriberName') || urlParams.get('user');
            topicName = urlParams.get('topic');
        }

        async function loadTopics() {
            const topicsDiv = document.getElementById('topicsList');
            
            try {
                const response = await fetch('/topics');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const topics = await response.json();
                allTopics = topics || [];
                
                if (allTopics.length > 0) {
                    let html = '';
                    allTopics.forEach(topic => {
                        // Check if this topic matches the one from URL (case-insensitive comparison)
                        const isChecked = topicName && (topic === topicName || topic.toLowerCase() === topicName.toLowerCase()) ? 'checked' : '';
                        html += `
                            <div class="topic-checkbox">
                                <input type="checkbox" id="topic-${escapeHtml(topic)}" name="topics" value="${escapeHtml(topic)}" ${isChecked}>
                                <label for="topic-${escapeHtml(topic)}">${escapeHtml(topic)}</label>
                            </div>
                        `;
                    });
                    topicsDiv.innerHTML = html;
                } else {
                    topicsDiv.innerHTML = '<p style="color: #999; font-style: italic;">No topics available</p>';
                }
            } catch (error) {
                console.error('Error loading topics:', error);
                topicsDiv.innerHTML = `<p style="color: #d32f2f;">Error loading topics: ${error.message}</p>`;
            }
        }

        function getSelectedTopics() {
            const checkboxes = document.querySelectorAll('input[name="topics"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // Handle dropdown change to show/hide "other" input
        function handleTitleChange() {
            const titleSelect = document.getElementById('title');
            const otherTitleGroup = document.getElementById('otherTitleGroup');
            if (titleSelect.value === 'other') {
                otherTitleGroup.style.display = 'block';
            } else {
                otherTitleGroup.style.display = 'none';
                document.getElementById('otherTitle').value = '';
            }
        }

        async function createConference(event) {
            event.preventDefault();
            
            const statusDiv = document.getElementById('statusMessage');
            const createButton = document.getElementById('createButton');
            const titleSelect = document.getElementById('title');
            let title = titleSelect.value.trim();
            
            if (!subscriberName) {
                statusDiv.innerHTML = '<div class="status error">Subscriber must be provided in URL parameters (e.g., ?subscriber=user1)</div>';
                return;
            }

            if (!title || title === '') {
                statusDiv.innerHTML = '<div class="status error">Conference title is required</div>';
                return;
            }

            // If "other" is selected, use the custom title
            if (title === 'other') {
                const otherTitle = document.getElementById('otherTitle').value.trim();
                if (!otherTitle) {
                    statusDiv.innerHTML = '<div class="status error">Please enter a custom conference title</div>';
                    return;
                }
                title = otherTitle;
            }

            // Get selected topics
            const selectedTopics = getSelectedTopics();
            if (selectedTopics.length === 0) {
                statusDiv.innerHTML = '<div class="status error">Please select at least one topic</div>';
                return;
            }

            createButton.disabled = true;
            createButton.textContent = 'Creating...';
            statusDiv.innerHTML = '';

            try {
                // Send as JSON to ensure topics is an array
                const response = await fetch('/conference', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        'user': subscriberName,
                        'title': title,
                        'topics': selectedTopics  // Send selected topics as array
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = '<div class="status success">Conference created successfully!</div>';
                    titleSelect.value = '';
                    document.getElementById('otherTitle').value = '';
                    document.getElementById('otherTitleGroup').style.display = 'none';
                    // Refresh conferences list (this will update sections if topic is now in a conference)
                    await loadConferences();
                    // Clear status after 3 seconds
                    setTimeout(() => {
                        statusDiv.innerHTML = '';
                    }, 3000);
                } else {
                    const errorText = await response.text();
                    throw new Error(`Failed to create conference: ${response.status} - ${errorText}`);
                }
            } catch (error) {
                console.error('Error creating conference:', error);
                statusDiv.innerHTML = `<div class="status error">Error: ${error.message}</div>`;
            } finally {
                createButton.disabled = false;
                createButton.textContent = 'Create Conference';
            }
        }

        function checkTopicInConference(conferences) {
            if (!topicName || !conferences) {
                return null;
            }
            
            // Find if the topic is in any conference's topics array
            for (const conf of conferences) {
                const topics = Array.isArray(conf.topics) ? conf.topics : [conf.topics];
                if (topics.some(t => t === topicName || t.toLowerCase() === topicName.toLowerCase())) {
                    return conf;
                }
            }
            return null;
        }

        function updateConferenceSections(conferences) {
            currentConference = checkTopicInConference(conferences);
            const createSection = document.getElementById('createConferenceSection');
            const manageSection = document.getElementById('manageConferenceSection');
            
            if (currentConference) {
                // Topic is in a conference - show manage section, hide create section
                createSection.style.display = 'none';
                manageSection.style.display = 'block';
                
                // Update conference info display
                const topics = Array.isArray(currentConference.topics) ? currentConference.topics.join(', ') : currentConference.topics;
                document.getElementById('conferenceTitleDisplay').textContent = currentConference.title || 'N/A';
                document.getElementById('conferenceUserDisplay').textContent = currentConference.user || 'N/A';
                document.getElementById('conferenceTopicsDisplay').textContent = topics || 'None';
            } else {
                // Topic is not in a conference - show create section, hide manage section
                createSection.style.display = 'block';
                manageSection.style.display = 'none';
            }
        }

        async function loadConferences() {
            const conferencesDiv = document.getElementById('conferencesList');
            
            try {
                const response = await fetch('/conference');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const conferences = await response.json();
                
                // Check if topic is in a conference and update sections
                updateConferenceSections(conferences);
                
                if (conferences && conferences.length > 0) {
                    let html = '<table><thead><tr><th>Title</th><th>User</th><th>Topics</th></tr></thead><tbody>';
                    
                    conferences.forEach(conf => {
                        const topics = Array.isArray(conf.topics) ? conf.topics.join(', ') : conf.topics;
                        html += `<tr>
                            <td>${escapeHtml(conf.title || 'N/A')}</td>
                            <td>${escapeHtml(conf.user || 'N/A')}</td>
                            <td>${escapeHtml(topics || 'None')}</td>
                        </tr>`;
                    });
                    
                    html += '</tbody></table>';
                    conferencesDiv.innerHTML = html;
                } else {
                    conferencesDiv.innerHTML = '<p style="color: #999; font-style: italic;">No active conferences</p>';
                }
            } catch (error) {
                console.error('Error loading conferences:', error);
                conferencesDiv.innerHTML = `<p style="color: #d32f2f;">Error loading conferences: ${error.message}</p>`;
            }
        }

        async function exitConference() {
            if (!currentConference || !subscriberName) {
                alert('Cannot exit conference: missing information');
                return;
            }
            
            const statusDiv = document.getElementById('statusMessage');
            const exitButton = document.getElementById('exitConferenceButton');
            
            if (!confirm('Are you sure you want to exit this conference?')) {
                return;
            }
            
            exitButton.disabled = true;
            exitButton.textContent = 'Exiting...';
            statusDiv.innerHTML = '';
            
            try {
                // Delete the conference (the API deletes by user)
                const response = await fetch('/conference', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        'user': currentConference.user
                    })
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '<div class="status success">Successfully exited conference!</div>';
                    // Refresh conferences list and update sections
                    await loadConferences();
                    await loadTopics();
                    // Clear status after 3 seconds
                    setTimeout(() => {
                        statusDiv.innerHTML = '';
                    }, 3000);
                } else {
                    const errorText = await response.text();
                    throw new Error(`Failed to exit conference: ${response.status} - ${errorText}`);
                }
            } catch (error) {
                console.error('Error exiting conference:', error);
                statusDiv.innerHTML = `<div class="status error">Error: ${error.message}</div>`;
            } finally {
                exitButton.disabled = false;
                exitButton.textContent = 'Exit Conference';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on page load
        window.addEventListener('load', function() {
            getUrlParams();
            loadTopics();
            loadConferences();
        });
    </script>
</body>
</html>
